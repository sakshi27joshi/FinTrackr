 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FinTrackr</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --surface-2: #F0EEE9;
      --border: #E5E2DA;
      --text-primary: #1A1916;
      --text-secondary: #6B6760;
      --text-muted: #A8A5A0;
      --accent: #2C5F4A;
      --accent-light: #EAF2EE;
      --accent-2: #C4773B;
      --accent-2-light: #FBF2EA;
      --danger: #B94040;
      --danger-light: #FBF0F0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 16px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.10);
      --radius: 14px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 32px 16px 64px;
    }

    .container { max-width: 860px; margin: 0 auto; }

    /* Header */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 36px;
      padding-bottom: 24px;
      border-bottom: 1.5px solid var(--border);
    }
    .header-left .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .header-left h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }
    .header-date {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* Cards */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s;
    }
    .card:hover { box-shadow: var(--shadow); }
    .card .label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .card .value {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .card.total .dot  { background: var(--text-primary); }
    .card.savings .value { color: var(--accent); }
    .card.luxuries .value { color: var(--danger); }
    .card .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
      vertical-align: middle;
      position: relative; top: -1px;
    }
    .card.savings .dot { background: var(--accent); }
    .card.luxuries .dot { background: var(--danger); }
    .card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* Progress bar */
    .breakdown-bar {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 22px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .breakdown-bar .bar-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .bar-track {
      display: flex;
      height: 8px;
      border-radius: 99px;
      overflow: hidden;
      gap: 2px;
      background: var(--surface-2);
    }
    .bar-segment { height: 100%; transition: width 0.4s ease; border-radius: 99px; }
    .bar-segment.nec  { background: #7BA7BC; }
    .bar-segment.sav  { background: var(--accent); }
    .bar-segment.lux  { background: var(--danger); }
    .bar-legend {
      display: flex; gap: 20px; margin-top: 10px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

    /* Input section */
    .input-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .input-card .section-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 14px;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr 140px 160px auto;
      gap: 10px;
      align-items: center;
    }
    input, select {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      background: var(--surface-2);
      border: 1.5px solid var(--border);
      border-radius: 9px;
      padding: 10px 13px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      -webkit-appearance: none;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus, select:focus {
      border-color: var(--accent);
      background: #fff;
    }
    select { cursor: pointer; }

    .btn-add {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 9px;
      padding: 10px 20px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.02em;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-add:hover { background: #234d3c; }
    .btn-add:active { transform: scale(0.97); }

    /* Table */
    .table-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow: var(--shadow-sm);
    }
    .table-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 22px 12px;
      border-bottom: 1.5px solid var(--border);
    }
    .table-header .section-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.10em; text-transform: uppercase;
      color: var(--text-muted);
    }
    .entry-count {
      font-size: 12px; color: var(--text-muted);
      background: var(--surface-2);
      border-radius: 99px; padding: 2px 10px;
    }

    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 10px 22px;
      text-align: left;
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface-2);
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface-2); }
    tbody td { padding: 12px 22px; font-size: 14px; color: var(--text-primary); }

    .badge {
      display: inline-block;
      font-size: 11px; font-weight: 500;
      padding: 3px 10px; border-radius: 99px;
    }
    .badge.nec { background: #EAF1F5; color: #4A7A8F; }
    .badge.sav { background: var(--accent-light); color: var(--accent); }
    .badge.lux { background: var(--danger-light); color: var(--danger); }

    .btn-del {
      font-size: 12px; font-weight: 500;
      color: var(--text-muted);
      background: none; border: none; cursor: pointer;
      padding: 4px 8px; border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }
    .btn-del:hover { color: var(--danger); background: var(--danger-light); }

    .amount-col { font-family: 'Playfair Display', serif; font-size: 15px; }

    .empty-state {
      padding: 40px 22px;
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state .icon { font-size: 28px; margin-bottom: 8px; }

    /* AI Advice */
    .advice-section { margin-bottom: 24px; }
    .btn-advice {
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      background: var(--surface);
      color: var(--text-primary);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-advice:hover { background: var(--surface-2); border-color: #ccc; }
    .btn-advice:active { transform: scale(0.99); }
    .btn-advice .spark { font-size: 16px; }

    .advice-box {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      margin-top: 14px;
      box-shadow: var(--shadow-sm);
      display: none;
    }
    .advice-box.visible { display: block; }
    .advice-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 17px; font-weight: 600;
      margin-bottom: 14px; color: var(--text-primary);
    }
    .advice-row {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
      font-size: 14px; color: var(--text-secondary); line-height: 1.55;
    }
    .advice-row:last-child { border-bottom: none; padding-bottom: 0; }
    .advice-row .icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .pct-pill {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 99px;
      margin-left: 4px; vertical-align: middle;
    }
    .pct-pill.nec { background: #EAF1F5; color: #4A7A8F; }
    .pct-pill.sav { background: var(--accent-light); color: var(--accent); }
    .pct-pill.lux { background: var(--danger-light); color: var(--danger); }

    @media (max-width: 620px) {
      .summary-grid { grid-template-columns: 1fr 1fr; }
      .card.total { grid-column: 1 / -1; }
      .input-row { grid-template-columns: 1fr 1fr; }
      .input-row .btn-add { grid-column: 1 / -1; }
      .header { flex-direction: column; align-items: flex-start; gap: 6px; }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="eyebrow">Personal Finance</div>
      <h1>FinTrackr</h1>
    </div>
    <div class="header-date" id="dateDisplay"></div>
  </div>

  <!-- Summary Cards -->
  <div class="summary-grid">
    <div class="card total">
      <div class="label">Total Recorded</div>
      <div class="value" id="total">₹0</div>
      <div class="sub">All categories combined</div>
    </div>
    <div class="card savings">
      <div class="label"><span class="dot"></span>Savings</div>
      <div class="value" id="savings">₹0</div>
      <div class="sub" id="savings-pct">—% of total</div>
    </div>
    <div class="card luxuries">
      <div class="label"><span class="dot"></span>Luxuries</div>
      <div class="value" id="luxuries">₹0</div>
      <div class="sub" id="luxuries-pct">—% of total</div>
    </div>
  </div>

  <!-- Breakdown bar -->
  <div class="breakdown-bar">
    <div class="bar-label">Spending Breakdown</div>
    <div class="bar-track">
      <div class="bar-segment nec" id="bar-nec" style="width:0%"></div>
      <div class="bar-segment sav" id="bar-sav" style="width:0%"></div>
      <div class="bar-segment lux" id="bar-lux" style="width:0%"></div>
    </div>
    <div class="bar-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#7BA7BC"></div>Necessities</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2C5F4A"></div>Savings / Investments</div>
      <div class="legend-item"><div class="legend-dot" style="background:#B94040"></div>Luxuries</div>
    </div>
  </div>

  <!-- Add Expense -->
  <div class="input-card">
    <div class="section-title">Add Entry</div>
    <div class="input-row">
      <input id="item" type="text" placeholder="Item name (e.g. Rent, SIP)">
      <input id="amount" type="number" placeholder="Amount (₹)" min="0">
      <select id="category">
        <option>Necessities</option>
        <option>Savings/Investments</option>
        <option>Luxuries</option>
      </select>
      <button class="btn-add" onclick="addExpense()">+ Add</button>
    </div>
  </div>

  <!-- Table -->
  <div class="table-card">
    <div class="table-header">
      <div class="section-title">Entries</div>
      <div class="entry-count" id="entry-count">0 items</div>
    </div>
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Amount</th>
          <th>Category</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="expenseList"></tbody>
    </table>
  </div>

  <!-- AI Advice -->
  <div class="advice-section">
    <button class="btn-advice" onclick="generateAdvice()">
      <span class="spark">✦</span> Generate Financial Analysis
    </button>
    <div class="advice-box" id="advice"></div>
  </div>

</div>

<script>
  // Date
  document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-IN', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  let expenses = [];
  try { expenses = JSON.parse(localStorage.getItem("expenses")) || []; } catch(e) { expenses = []; }

  function saveData() {
    try { localStorage.setItem("expenses", JSON.stringify(expenses)); } catch(e) {}
  }

  function fmt(n) {
    return '₹' + n.toLocaleString('en-IN', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  }

  function badgeClass(cat) {
    if (cat === 'Savings/Investments') return 'sav';
    if (cat === 'Luxuries') return 'lux';
    return 'nec';
  }

  function addExpense() {
    const item = document.getElementById("item").value.trim();
    const amount = parseFloat(document.getElementById("amount").value);
    const category = document.getElementById("category").value;

    if (!item || isNaN(amount) || amount <= 0) {
      document.getElementById("item").style.borderColor = "#B94040";
      setTimeout(() => document.getElementById("item").style.borderColor = '', 1200);
      return;
    }

    expenses.push({ item, amount, category });
    saveData();
    render();

    document.getElementById("item").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("item").focus();
  }

  document.getElementById("amount").addEventListener("keydown", e => {
    if (e.key === "Enter") addExpense();
  });
  document.getElementById("item").addEventListener("keydown", e => {
    if (e.key === "Enter") document.getElementById("amount").focus();
  });

  function deleteExpense(index) {
    expenses.splice(index, 1);
    saveData();
    render();
  }

  function render() {
    const list = document.getElementById("expenseList");
    list.innerHTML = "";

    let total = 0, savings = 0, luxuries = 0, necessities = 0;

    if (expenses.length === 0) {
      list.innerHTML = `<tr><td colspan="4">
        <div class="empty-state">
          <div class="icon">📋</div>
          No entries yet. Add your first expense above.
        </div></td></tr>`;
    } else {
      expenses.forEach((exp, index) => {
        const bc = badgeClass(exp.category);
        list.innerHTML += `
          <tr>
            <td>${exp.item}</td>
            <td class="amount-col">${fmt(exp.amount)}</td>
            <td><span class="badge ${bc}">${exp.category}</span></td>
            <td><button class="btn-del" onclick="deleteExpense(${index})">Remove</button></td>
          </tr>`;
        total += exp.amount;
        if (exp.category === "Savings/Investments") savings += exp.amount;
        else if (exp.category === "Luxuries") luxuries += exp.amount;
        else necessities += exp.amount;
      });
    }

    document.getElementById("total").textContent = fmt(total);
    document.getElementById("savings").textContent = fmt(savings);
    document.getElementById("luxuries").textContent = fmt(luxuries);
    document.getElementById("entry-count").textContent = `${expenses.length} item${expenses.length !== 1 ? 's' : ''}`;

    const savPct = total > 0 ? (savings / total * 100) : 0;
    const luxPct = total > 0 ? (luxuries / total * 100) : 0;
    const necPct = total > 0 ? (necessities / total * 100) : 0;

    document.getElementById("savings-pct").textContent = total > 0 ? `${savPct.toFixed(1)}% of total` : '—% of total';
    document.getElementById("luxuries-pct").textContent = total > 0 ? `${luxPct.toFixed(1)}% of total` : '—% of total';

    document.getElementById("bar-nec").style.width = necPct + '%';
    document.getElementById("bar-sav").style.width = savPct + '%';
    document.getElementById("bar-lux").style.width = luxPct + '%';

    window.summary = { total, savings, luxuries, necessities };
  }

  function generateAdvice() {
    const { total, savings, luxuries, necessities } = window.summary || {};
    const adviceBox = document.getElementById("advice");

    if (!total || total === 0) {
      adviceBox.classList.add("visible");
      adviceBox.innerHTML = `<h3>Financial Analysis</h3><div class="advice-row"><span class="icon">ℹ️</span><span>Add some entries to receive your personalised financial analysis.</span></div>`;
      return;
    }

    const savPct = (savings / total * 100);
    const luxPct = (luxuries / total * 100);
    const necPct = (necessities / total * 100);

    let rows = '';

    rows += `<div class="advice-row"><span class="icon">📊</span><span>
      Your spending: Necessities <span class="pct-pill nec">${necPct.toFixed(1)}%</span>
      · Savings <span class="pct-pill sav">${savPct.toFixed(1)}%</span>
      · Luxuries <span class="pct-pill lux">${luxPct.toFixed(1)}%</span>
    </span></div>`;

    if (savPct < 10) {
      rows += `<div class="advice-row"><span class="icon">⚠️</span><span>Your savings rate is critically low at ${savPct.toFixed(1)}%. Financial advisors typically recommend saving 20% or more. Consider setting up an automatic transfer on payday to build the habit.</span></div>`;
    } else if (savPct < 20) {
      rows += `<div class="advice-row"><span class="icon">📈</span><span>Your savings rate is ${savPct.toFixed(1)}% — below the 20% benchmark. Look for one or two recurring expenses to reduce so you can increase contributions to SIPs or an emergency fund.</span></div>`;
    } else {
      rows += `<div class="advice-row"><span class="icon">✅</span><span>Savings rate of ${savPct.toFixed(1)}% is healthy. Ensure your investments are diversified — consider equity mutual funds, index funds, and a liquid emergency corpus of 3–6 months of expenses.</span></div>`;
    }

    if (luxPct > 30) {
      rows += `<div class="advice-row"><span class="icon">🚨</span><span>Luxury spending at ${luxPct.toFixed(1)}% is high. Audit recurring subscriptions, food delivery habits, and impulse purchases. Redirecting even 10% here can meaningfully boost your savings rate.</span></div>`;
    } else if (luxPct > 15) {
      rows += `<div class="advice-row"><span class="icon">🎯</span><span>Luxury spending is moderate at ${luxPct.toFixed(1)}%. Keep a monthly cap to prevent lifestyle inflation, especially as income grows.</span></div>`;
    } else {
      rows += `<div class="advice-row"><span class="icon">👍</span><span>Discretionary spending is well controlled at ${luxPct.toFixed(1)}%. Maintain this discipline — it compounds significantly over time.</span></div>`;
    }

    if (necPct > 60) {
      rows += `<div class="advice-row"><span class="icon">🏠</span><span>Necessities consume ${necPct.toFixed(1)}% of recorded spending. If rent or EMIs are the primary driver, explore options like negotiating rent, switching to a shorter commute, or refinancing loans at better rates.</span></div>`;
    } else {
      rows += `<div class="advice-row"><span class="icon">✔️</span><span>Essential expenses at ${necPct.toFixed(1)}% leave adequate room for savings and discretionary spending — a balanced foundation.</span></div>`;
    }

    adviceBox.classList.add("visible");
    adviceBox.innerHTML = `<h3>Financial Analysis</h3>${rows}`;
  }

  render();
</script>

</body>
</html>
